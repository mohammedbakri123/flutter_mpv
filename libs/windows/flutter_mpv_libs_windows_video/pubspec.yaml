name: flutter_mpv_libs_windows_video
description: Windows package providing video (& audio) native libraries for package:flutter_mpv.
version: 1.0.13
homepage: https://github.com/mohammedbakri123/MPx-Player
repository: https://github.com/mohammedbakri123/MPx-Player

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: FlutterMpvLibsWindowsVideoPluginCApi
