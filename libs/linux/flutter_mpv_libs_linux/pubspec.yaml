name: flutter_mpv_libs_linux
description: GNU/Linux dependency package for package:flutter_mpv. Necessary for initialization.
version: 1.2.1
homepage: https://github.com/mohammed/flutter_mpv.git
repository: https://github.com/mohammed/flutter_mpv.git

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: FlutterMpvLibsLinuxPlugin
