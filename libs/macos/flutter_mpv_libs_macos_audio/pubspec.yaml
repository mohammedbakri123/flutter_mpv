name: flutter_mpv_libs_macos_audio
description: macOS package providing audio native libraries for package:flutter_mpv.
version: 1.1.5
homepage: https://github.com/mohammed/flutter_mpv.git
repository: https://github.com/mohammed/flutter_mpv.git

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: FlutterMpvLibsMacosAudioPlugin
