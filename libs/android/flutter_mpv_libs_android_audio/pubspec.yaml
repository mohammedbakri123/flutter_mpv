name: flutter_mpv_libs_android_audio
description: Android package providing audio (only) native libraries for package:flutter_mpv.
version: 1.3.11
homepage: https://github.com/mohammedbakri123/MPx-Player
repository: https://github.com/mohammedbakri123/MPx-Player

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.mohammed.flutter_mpv_libs_android_audio
        pluginClass: FlutterMpvLibsAndroidAudioPlugin
